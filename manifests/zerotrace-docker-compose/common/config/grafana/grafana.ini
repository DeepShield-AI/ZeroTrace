[analytics]
check_for_updates = true
[database]
host = zerotrace-mysql:30130
name = grafana
password = zerotrace
type = mysql
user = root
[grafana_net]
url = https://grafana.net
[log]
mode = console
[paths]
data = /var/lib/grafana/
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning
[plugins]
allow_loading_unsigned_plugins = zerotrace-querier-datasource,zerotrace-apptracing-panel,zerotrace-topo-panel,zerotraceio-tracing-panel,zerotraceio-zerotrace-datasource,zerotraceio-topo-panel